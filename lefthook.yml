# lefthook.yml - Git hooks configuration
# Replaces Husky with a faster, dependency-free alternative
# https://github.com/evilmartians/lefthook

pre-commit:
  parallel: false
  commands:
    markdown-lint:
      glob: "*.md"
      run: |
        # Get staged markdown files
        STAGED_MD=$(git diff --cached --name-only --diff-filter=ACM | grep '\.md$' || true)
        if [ -n "$STAGED_MD" ]; then
          COUNT=$(echo "$STAGED_MD" | wc -l | tr -d ' ')
          echo "📝 Validating $COUNT markdown file(s)..."
          # Lint staged files only, suppress verbose Finding: output
          RESULT=$(echo "$STAGED_MD" | xargs markdownlint-cli2 --no-globs 2>&1)
          # Show only Summary and errors, skip Finding/Linting lines
          echo "$RESULT" | grep -v -E '^(Finding:|Linting:)' || true
        else
          echo "ℹ️  No markdown files to validate"
        fi
      stage_fixed: true

    link-check:
      glob: "site/src/content/docs/**/*.{md,mdx}"
      run: |
        # Get staged site docs markdown files
        STAGED_DOCS=$(git diff --cached --name-only --diff-filter=ACM | grep -E '^site/src/content/docs/.*\.(md|mdx)$' || true)
        if [ -n "$STAGED_DOCS" ]; then
          echo "🔗 Checking links in $(echo "$STAGED_DOCS" | wc -l | tr -d ' ') doc file(s)..."
          # Use npx to run from local node_modules (avoids Node.js 24 global install bug)
          echo "$STAGED_DOCS" | xargs -I {} npx markdown-link-check {} --config .markdown-link-check-site.json --quiet
        else
          echo "ℹ️  No docs to check links"
        fi

    h2-sync:
      glob: "{.github/skills/azure-artifacts/SKILL.md,.github/instructions/azure-artifacts*,scripts/validate-artifact-templates*}"
      run: |
        STAGED_SYNC=$(git diff --cached --name-only --diff-filter=ACM | grep -E '(SKILL\.md|azure-artifacts|validate-artifact-templates)' || true)
        if [ -n "$STAGED_SYNC" ]; then
          echo "🔄 Checking H2 heading sync across sources..."
          npm run validate:artifacts
        else
          echo "ℹ️  No H2-source files to sync-check"
        fi
      fail_text: |
        ❌ H2 heading sync failed!

        Sources must match: SKILL.md ↔ azure-artifacts ↔ validator
        🔧 Run: npm run lint:h2-sync

    artifact-validation:
      glob: "{agent-output,.github/skills/azure-artifacts/templates}/**/*.md"
      run: |
        # Check if any agent-output artifacts are staged
        STAGED_ARTIFACTS=$(git diff --cached --name-only --diff-filter=ACM | grep -E '^agent-output/.*\.md$' || true)
        if [ -n "$STAGED_ARTIFACTS" ]; then
          COUNT=$(echo "$STAGED_ARTIFACTS" | wc -l | tr -d ' ')
          echo "📋 Validating $COUNT artifact(s) against templates..."
          # Run full artifact validation - blocks on any H2 mismatch
          if ! npm run validate:artifacts; then
            echo ""
            echo "❌ Artifact template validation failed!"
            echo ""
            echo "🔧 To fix:"
            echo "   1. Check .github/instructions/azure-artifacts.instructions.md"
            echo "   2. Use EXACT H2 headings from that file"
            echo "   3. Run: npm run fix:artifacts -- <file> --apply"
            echo "   4. Re-stage and commit"
            echo ""
            exit 1
          fi
        else
          echo "ℹ️  No agent-output artifacts to validate"
        fi
      fail_text: |
        ❌ Artifact H2 structure validation failed!

        📚 Reference: .github/instructions/azure-artifacts.instructions.md
        🔧 Auto-fix: npm run fix:artifacts -- <file> --apply

    agent-frontmatter:
      glob: "**/*.agent.md"
      run: |
        # Check if any agent files are staged
        STAGED_AGENTS=$(git diff --cached --name-only --diff-filter=ACM | grep -E '\.agent\.md$' || true)
        if [ -n "$STAGED_AGENTS" ]; then
          COUNT=$(echo "$STAGED_AGENTS" | wc -l | tr -d ' ')
          echo "🤖 Validating $COUNT agent file(s)..."
          npm run validate:agents
        else
          echo "ℹ️  No agent files to validate"
        fi
      fail_text: |
        ❌ Agent frontmatter validation failed!

        🔧 Check YAML syntax in agent definitions
        📚 Reference: .github/instructions/agent-authoring.instructions.md

    model-alignment:
      glob: "**/*.agent.md,**/*.prompt.md"
      run: |
        STAGED=$(git diff --cached --name-only --diff-filter=ACM | grep -E '\.(agent|prompt)\.md$' || true)
        if [ -n "$STAGED" ]; then
          echo "🔗 Checking model-prompt alignment..."
          npm run validate:agents
        else
          echo "ℹ️  No agent/prompt files to check"
        fi
      fail_text: |
        ❌ Model-prompt alignment check failed!

        🔧 Fix prompt model mismatches or stale handoff overrides
        📚 Reference: .github/instructions/agent-authoring.instructions.md

    agent-checks:
      glob: "**/*.agent.md"
      run: |
        STAGED_AGENTS=$(git diff --cached --name-only --diff-filter=ACM | grep -E '\.agent\.md$' || true)
        if [ -n "$STAGED_AGENTS" ]; then
          echo "📝 Checking agent body size + language density..."
          npm run validate:agents
        else
          echo "ℹ️  No agent files to check"
        fi
      fail_text: |
        ❌ Agent checks failed!

        🔧 Fix body size (>400 lines) or soften absolute language (>5/100 lines)

    instruction-checks:
      glob: "**/*.instructions.md"
      run: |
        STAGED_INSTR=$(git diff --cached --name-only --diff-filter=ACM | grep -E '\.instructions\.md$' || true)
        if [ -n "$STAGED_INSTR" ]; then
          COUNT=$(echo "$STAGED_INSTR" | wc -l | tr -d ' ')
          echo "📋 Validating $COUNT instruction file(s)..."
          npm run validate:instruction-checks
        else
          echo "ℹ️  No instruction files to validate"
        fi
      fail_text: |
        ❌ Instruction frontmatter validation failed!

        📚 Allowed fields: description, applyTo
        🔧 Remove any non-standard fields from YAML frontmatter

    instruction-refs:
      glob: "{.github/agents/**,.github/skills/**,.github/instructions/**}"
      run: |
        STAGED_REFS=$(git diff --cached --name-only --diff-filter=ACM | grep -E '\.(agent|instructions)\.md$|SKILL\.md$' || true)
        if [ -n "$STAGED_REFS" ]; then
          echo "🔗 Validating instruction cross-references..."
          npm run validate:instruction-checks
        else
          echo "ℹ️  No agent/skill/instruction files to check references"
        fi
      fail_text: |
        ❌ Instruction reference validation failed!

        🔧 A referenced instruction or skill file does not exist.
        📚 Run: npm run validate:instruction-checks

    python-lint:
      glob: "mcp/**/*.py"
      run: |
        STAGED_PY=$(git diff --cached --name-only --diff-filter=ACM | grep -E '^mcp/.*\.py$' || true)
        if [ -n "$STAGED_PY" ]; then
          COUNT=$(echo "$STAGED_PY" | wc -l | tr -d ' ')
          echo "🐍 Linting $COUNT Python file(s) with ruff..."
          cd mcp/azure-pricing-mcp && python -m ruff check src/ tests/
        else
          echo "ℹ️  No Python files to lint"
        fi
      fail_text: |
        ❌ Python lint failed!

        🔧 Fix: cd mcp/azure-pricing-mcp && python -m ruff check --fix src/ tests/

    terraform-fmt:
      glob: "*.tf"
      run: |
        STAGED_TF=$(git diff --cached --name-only --diff-filter=ACM | grep '\.tf$' || true)
        if [ -n "$STAGED_TF" ]; then
          echo "🔧 Checking Terraform formatting..."
          terraform fmt -check -recursive infra/terraform/ || {
            echo "❌ terraform fmt failed. Run: terraform fmt -recursive infra/terraform/"
            exit 1
          }
        else
          echo "ℹ️  No Terraform files to format-check"
        fi

    terraform-validate:
      glob: "*.tf"
      run: |
        STAGED_TF=$(git diff --cached --name-only --diff-filter=ACM | grep '\.tf$' || true)
        if [ -n "$STAGED_TF" ]; then
          echo "🔧 Validating Terraform..."
          for dir in infra/terraform/*/; do
            if [ -f "$dir/main.tf" ]; then
              echo "  Validating $dir..."
              (cd "$dir" && terraform init -backend=false -input=false -no-color > /dev/null 2>&1 \
                && terraform validate -no-color) || { echo "❌ Validation failed in $dir"; exit 1; }
            fi
          done
        else
          echo "ℹ️  No Terraform project to validate"
        fi

    iac-security-baseline:
      glob: "{infra/bicep/**/*.bicep,infra/terraform/**/*.tf}"
      run: |
        STAGED_IAC=$(git diff --cached --name-only --diff-filter=ACM | grep -E '\.(bicep|tf)$' || true)
        if [ -n "$STAGED_IAC" ]; then
          echo "🔒 Checking IaC security baseline..."
          npm run validate:iac-security-baseline
        else
          echo "ℹ️  No IaC files to security-check"
        fi
      fail_text: |
        ❌ IaC security baseline violation!

        🔧 Fix: TLS 1.2+, HTTPS-only, no public blob access, managed identity
        📚 Reference: AGENTS.md Security Baseline section

commit-msg:
  commands:
    commitlint:
      run: npx --no -- commitlint --edit {1}
      fail_text: |
        ❌ Commit message validation failed!

        📖 Conventional Commits format required:
           <type>[optional scope]: <description>

           Types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert

           Examples:
             feat: add new Azure App Service module
             fix(bicep): correct storage account naming
             docs: update README with deployment steps

# Diff-based pre-push validation — runs only matching domain validators in parallel
pre-push:
  parallel: true
  commands:
    branch-naming:
      run: bash scripts/validate-branch-naming.sh
      fail_text: |
        ❌ Branch naming convention violated!

        🔧 Rename your branch using an approved prefix:
           docs/, agents/, skills/, infra/, scripts/, instructions/,
           fix/, feat/, chore/, ci/, refactor/, perf/, test/, build/, revert/

    branch-scope:
      run: bash scripts/validate-branch-scope.sh
      fail_text: |
        ❌ Branch scope violation!

        Domain-scoped branches (docs/, agents/, skills/, etc.) should only
        modify files within their domain. Use feat/ or fix/ for cross-cutting changes.

    diff-based-check:
      run: bash scripts/diff-based-push-check.sh
      fail_text: |
        ❌ Pre-push validation failed!

        🔧 Run the failing validator manually to see details.
        Only validators for changed file types were executed.

# Post-commit validation checks (enforced)
post-commit:
  commands:
    version-sync:
      run: |
        echo "🔍 Checking version synchronization..."
        node scripts/validate-version-sync.mjs
      fail_text: "❌ Version sync check failed"

    deprecated-refs:
      glob: "*.md"
      run: |
        echo "🔍 Checking for deprecated references..."
        node scripts/validate-no-deprecated-refs.mjs
      fail_text: "❌ Deprecated references check failed"

    terminology:
      glob: "*.{md,mdx,json,mjs,py,yml,yaml,sh,toml,astro,css,html,txt,svg}"
      run: |
        echo "🔍 Checking terminology blocklist..."
        node scripts/validate-terminology.mjs
      fail_text: "❌ Terminology check failed"

    json-syntax:
      glob: "*.json"
      run: |
        echo "🔍 Validating JSON syntax..."
        # Use last commit's changed files (post-commit has no staged files)
        CHANGED_JSON=$(git diff --name-only HEAD~1..HEAD 2>/dev/null | grep '\.json$' | grep -v node_modules | grep -v infra || true)
        if [ -n "$CHANGED_JSON" ]; then
          for f in $CHANGED_JSON; do
            [ -f "$f" ] && node -e "JSON.parse(require('fs').readFileSync('$f'))" 2>/dev/null && echo "  ✓ $f" || { echo "  ✗ $f - Invalid JSON"; exit 1; }
          done
        fi
      fail_text: "❌ JSON syntax validation failed"
